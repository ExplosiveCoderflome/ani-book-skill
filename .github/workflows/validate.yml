name: Validate

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  python-tools:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: python -m pip install --disable-pip-version-check -r requirements.txt
      - name: Compile scripts
        run: python -m compileall -q scripts
      - name: Check CLI entry points
        run: |
          python scripts/export_novel_txt.py --help
          python scripts/check_continuity_workspace.py --help
          python scripts/continuity_store.py --help
          python scripts/analysis_retrieval.py --help
          python scripts/trend_snapshot.py --help
          python scripts/token_usage.py --help
          python scripts/novelctl.py --help
          python scripts/asset_graph.py --help
          python scripts/sync_skill_mirror.py --help
      - name: Run tests
        run: python -m unittest discover -s tests -v
